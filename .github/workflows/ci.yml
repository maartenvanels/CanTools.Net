name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-dotnet@v6
        with:
          dotnet-version: 10.0.x
      - name: Test
        run: dotnet test tests/CanTools.Tests/CanTools.Tests.csproj -c Release

  pack:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-dotnet@v6
        with:
          dotnet-version: 10.0.x
      - name: Use the tag as the package version
        if: startsWith(github.ref, 'refs/tags/v')
        run: echo "VERSION_ARG=-p:Version=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"
      - name: Pack
        run: |
          dotnet pack src/CanTools/CanTools.csproj -c Release -o artifacts -p:ContinuousIntegrationBuild=true $VERSION_ARG
          dotnet pack src/CanTools.Cli/CanTools.Cli.csproj -c Release -o artifacts -p:ContinuousIntegrationBuild=true $VERSION_ARG
      - uses: actions/upload-artifact@v7
        with:
          name: nuget-package
          path: artifacts/*nupkg

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: pack
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-dotnet@v6
        with:
          dotnet-version: 10.0.x
      - uses: actions/download-artifact@v8
        with:
          name: nuget-package
          path: artifacts
      - name: Publish self-contained executables
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          for rid in win-x64 linux-x64 osx-x64 osx-arm64; do
            dotnet publish src/CanTools.Cli/CanTools.Cli.csproj \
              -c Release -r "$rid" --self-contained true \
              -p:PublishSingleFile=true -p:Version="$VERSION" \
              -o "publish/$rid"
            ext=""
            [ "$rid" = "win-x64" ] && ext=".exe"
            mv "publish/$rid/CanTools.Cli$ext" "artifacts/cantools-net-$rid$ext"
          done
      - name: Create the GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes \
            artifacts/cantools-net-* artifacts/*.nupkg

  publish:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: pack
    environment: nuget
    permissions:
      contents: read
      actions: read
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: nuget-package
          path: artifacts
      - uses: actions/setup-dotnet@v6
        with:
          dotnet-version: 10.0.x
      # Trusted Publishing: exchange the GitHub OIDC token for a short-lived
      # (1 hour, single-use) nuget.org API key just before the push.
      - name: NuGet login
        uses: NuGet/login@v1
        id: login
        with:
          user: ${{ secrets.NUGET_USER }}
      - name: Push to NuGet.org
        run: >
          dotnet nuget push "artifacts/*.nupkg"
          --api-key "${{ steps.login.outputs.NUGET_API_KEY }}"
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate
