name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - name: Test
        run: dotnet test tests/CanTools.Tests/CanTools.Tests.csproj -c Release

  pack:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - name: Use the tag as the package version
        if: startsWith(github.ref, 'refs/tags/v')
        run: echo "VERSION_ARG=-p:Version=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"
      - name: Pack
        run: dotnet pack src/CanTools/CanTools.csproj -c Release -o artifacts -p:ContinuousIntegrationBuild=true $VERSION_ARG
      - uses: actions/upload-artifact@v4
        with:
          name: nuget-package
          path: artifacts/*nupkg

  publish:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: pack
    environment: nuget
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: nuget-package
          path: artifacts
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - name: Push to NuGet.org
        run: >
          dotnet nuget push "artifacts/*.nupkg"
          --api-key "${{ secrets.NUGET_API_KEY }}"
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate
